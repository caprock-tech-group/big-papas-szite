[build]
  command = "npm run build:netlify"
  publish = "netlify-dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; frame-src https://www.openstreetmap.org; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/update/*"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0"
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "http://update.bigpapastaters.com/*"
  to = "https://bigpapastaters.com/update/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://update.bigpapastaters.com/*"
  to = "https://bigpapastaters.com/update/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/update"
  to = "/update/"
  status = 301
